<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة مزارع الدواجن - الشركة المصرية</title>
<style>:root{--bg:#f6f7fb; --bg2:#eef0f7; --surface:#ffffff; --card:#ffffff; --card2:#f8f9fd; --border:#e7e9f2; --border2:#d8dbe9; --ring:rgba(99,91,255,.35); --primary:#635bff; --primary-d:#5147e6; --primary-l:#8b85ff; --primary-soft:#eef0ff; --txt:#1a1c2e; --txt2:#5b607a; --txt3:#9095af; --txt-on:#ffffff; --green:#0f9d58; --green-l:#16c172; --red:#e23048;   --red-l:#fb5a6f; --amber:#d68310; --amber-l:#f5a623; --cyan:#0e9bbd;  --cyan-l:#22d3ee; --purple:#8b3ff0;--purple-l:#a855f7; --blue:#2f6bff;  --blue-l:#5b8def; --orange:#e8590c;--orange-l:#fb923c; --pink:#d6457f;  --pink-l:#ec4899; --teal:#0d9488;  --teal-l:#2dd4bf; --slate:#566073; --slate-l:#7c889e; --indigo:#4f46e5;--indigo-l:#818cf8; --ok-bg:rgba(15,157,88,.12); --warn-bg:rgba(214,131,16,.14); --bad-bg:rgba(226,48,72,.12); --info-bg:rgba(99,91,255,.12); --grad:linear-gradient(135deg,#635bff,#8b85ff 55%,#a855f7); --grad2:linear-gradient(135deg,#5147e6,#7c5cff); --grad-green:linear-gradient(135deg,#0f9d58,#16c172); --grad-red:linear-gradient(135deg,#e23048,#fb5a6f); --grad-blue:linear-gradient(135deg,#2f6bff,#5b8def); --grad-surface:linear-gradient(180deg,#ffffff,#fbfbfe); --r-xs:8px; --r-sm:10px; --r-md:14px; --r-lg:18px; --r-xl:24px; --r-pill:999px; --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:20px; --s6:24px; --s8:32px; --sh-xs:0 1px 2px rgba(26,28,46,.06); --sh-sm:0 2px 6px rgba(26,28,46,.07),0 1px 2px rgba(26,28,46,.05); --sh-md:0 8px 24px rgba(26,28,46,.09),0 2px 6px rgba(26,28,46,.05); --sh-lg:0 18px 48px rgba(26,28,46,.14),0 6px 16px rgba(26,28,46,.08); --sh-primary:0 8px 24px rgba(99,91,255,.32); --sh-focus:0 0 0 4px var(--ring); --fs-xs:11.5px; --fs-sm:12.5px; --fs-base:14px; --fs-md:15px; --fs-lg:18px; --fs-xl:22px; --fs-2xl:28px; --fs-3xl:34px; --ease:cubic-bezier(.4,0,.2,1); --ease-out:cubic-bezier(.16,1,.3,1)}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
html,body{overflow-x:hidden;max-width:100%}
body{font-family:'Inter','Segoe UI','Helvetica Neue',Tahoma,Arial,sans-serif; background:
radial-gradient(900px 500px at 88% -8%,#eceaff,transparent 60%),
radial-gradient(700px 500px at -5% 0%,#e7f6ff,transparent 55%),
var(--bg); background-attachment:fixed; color:var(--txt); font-size:var(--fs-base); line-height:1.6; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:var(--r-pill);border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--primary-l)}
::selection{background:var(--primary-soft);color:var(--primary-d)}
#login{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px; background:
radial-gradient(800px 500px at 75% -10%,#e4e1ff,transparent 60%),
radial-gradient(700px 500px at 10% 110%,#dff3ff,transparent 55%),
var(--bg)}
.login-card{background:var(--grad-surface);border:1px solid var(--border);border-radius:var(--r-xl); padding:44px 38px;width:100%;max-width:430px;box-shadow:var(--sh-lg);position:relative;overflow:hidden; animation:popIn .5s var(--ease-out) both}
.login-card::before{content:'';position:absolute;inset:0 0 auto 0;height:5px;background:var(--grad)}
.login-card .logo{font-size:54px;text-align:center;margin-bottom:10px;filter:drop-shadow(0 6px 14px rgba(99,91,255,.3))}
.login-card h1{font-size:var(--fs-xl);text-align:center;margin-bottom:6px;font-weight:800;letter-spacing:-.5px; background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.login-card .sub{text-align:center;color:var(--txt2);font-size:var(--fs-sm);margin-bottom:30px}
.login-card label{display:block;font-size:var(--fs-sm);color:var(--txt2);margin:16px 0 7px;font-weight:600}
.login-card select,.login-card input{width:100%}
.login-err{color:var(--red);font-size:var(--fs-sm);text-align:center;margin-top:14px;min-height:16px;font-weight:600}
input,select,textarea{background:var(--surface);border:1.5px solid var(--border);color:var(--txt); padding:11px 13px;border-radius:var(--r-sm);font-family:inherit;font-size:var(--fs-base); outline:none;transition:border-color .18s var(--ease),box-shadow .18s var(--ease),background .18s; max-width:100%}
input:hover,select:hover,textarea:hover{border-color:var(--border2)}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:var(--sh-focus)}
input::placeholder{color:var(--txt3)}
select{cursor:pointer}
button{font-family:inherit;cursor:pointer;border:none;transition:transform .15s var(--ease),box-shadow .2s var(--ease),filter .2s,background .2s}
.btn{background:var(--grad);color:var(--txt-on);padding:11px 20px;border-radius:var(--r-sm); font-size:var(--fs-base);font-weight:600;box-shadow:var(--sh-primary);letter-spacing:.1px; display:inline-flex;align-items:center;gap:7px}
.btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 12px 28px rgba(99,91,255,.42)}
.btn:active{transform:translateY(0);filter:brightness(.98)}
.btn-lg{width:100%;padding:14px;font-size:var(--fs-md);margin-top:24px;justify-content:center}
.btn-sec{background:var(--surface);color:var(--txt);border:1.5px solid var(--border2);box-shadow:var(--sh-xs)}
.btn-sec:hover{background:var(--card2);border-color:var(--primary-l);color:var(--primary-d);filter:none}
.btn-green{background:var(--grad-green);box-shadow:0 8px 24px rgba(15,157,88,.3)}
.btn-red{background:var(--grad-red);box-shadow:0 8px 24px rgba(226,48,72,.3)}
.btn-amber{background:linear-gradient(135deg,#d68310,#f5a623);box-shadow:0 8px 24px rgba(214,131,16,.3)}
.btn-green:hover,.btn-red:hover,.btn-amber:hover{filter:brightness(1.07);transform:translateY(-1px)}
.btn-sm{padding:7px 13px;font-size:var(--fs-sm);border-radius:var(--r-xs)}
.btn-xs{padding:5px 10px;font-size:var(--fs-xs);border-radius:var(--r-xs);box-shadow:none}
#app{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:14px;padding:12px 22px; background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(16px); border-bottom:1px solid var(--border);box-shadow:var(--sh-xs)}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:var(--fs-md);white-space:nowrap;letter-spacing:-.3px}
.topbar .brand .ic{font-size:24px;filter:drop-shadow(0 3px 8px rgba(99,91,255,.35))}
.topbar .brand span:last-child{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.topbar .spacer{flex:1}
.user-chip{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--border); padding:6px 13px;border-radius:var(--r-pill);font-size:var(--fs-sm);box-shadow:var(--sh-xs)}
.user-chip .role{color:var(--primary-d);font-weight:700}
.menu-btn{display:none;background:var(--card2);border:1px solid var(--border);color:var(--txt); width:40px;height:40px;border-radius:var(--r-sm);font-size:18px}
.layout{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:248px;background:rgba(255,255,255,.6);backdrop-filter:blur(8px); border-left:1px solid var(--border);padding:18px 12px;flex-shrink:0;overflow-y:auto}
.nav-group{font-size:var(--fs-xs);color:var(--txt3);text-transform:uppercase;letter-spacing:.7px; margin:20px 12px 8px;font-weight:800}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--r-sm); color:var(--txt2);cursor:pointer;font-size:13.5px;margin-bottom:3px;font-weight:600;position:relative; transition:background .18s var(--ease),color .18s,transform .12s}
.nav-item .ic{font-size:18px;width:24px;text-align:center}
.nav-item:hover{background:var(--primary-soft);color:var(--primary-d)}
.nav-item.active{background:var(--grad);color:var(--txt-on);box-shadow:var(--sh-primary)}
.nav-item.active::before{content:'';position:absolute;right:-12px;top:50%;transform:translateY(-50%); width:4px;height:60%;background:var(--primary);border-radius:var(--r-pill)}
.main{flex:1;padding:26px;overflow-x:auto;min-width:0}
.page{display:none;animation:fade .3s var(--ease-out)}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:none}
}
.page-head{display:flex;align-items:center;gap:13px;margin-bottom:24px;flex-wrap:wrap}
.page-head h2{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-.7px}
.page-head .desc{color:var(--txt2);font-size:var(--fs-sm)}
.page-head .spacer{flex:1}
.card{background:var(--grad-surface);border:1px solid var(--border);border-radius:var(--r-lg); padding:22px;box-shadow:var(--sh-sm);transition:box-shadow .25s var(--ease),transform .25s var(--ease);min-width:0;max-width:100%}
.card:hover{box-shadow:var(--sh-md)}
.card+.card{margin-top:18px}
.card-title{font-size:var(--fs-md);font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:9px;letter-spacing:-.3px}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g5{grid-template-columns:repeat(5,1fr)}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 20px;position:relative;overflow:hidden; border-top:3px solid var(--primary);box-shadow:var(--sh-xs);transition:transform .25s var(--ease-out),box-shadow .25s}
.kpi::before{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px; background:radial-gradient(circle,var(--primary),transparent 70%);border-radius:50%;opacity:.06}
.kpi.g{border-top-color:#16a34a}
.kpi.g .val{color:#15803d}
.kpi.g::before{background:radial-gradient(circle,#16a34a,transparent 70%)}
.kpi.r{border-top-color:#e11d48}
.kpi.r .val{color:#be123c}
.kpi.r::before{background:radial-gradient(circle,#e11d48,transparent 70%)}
.kpi.a{border-top-color:#d97706}
.kpi.a .val{color:#b45309}
.kpi.a::before{background:radial-gradient(circle,#d97706,transparent 70%)}
.kpi.c{border-top-color:#0891b2}
.kpi.c .val{color:#0e7490}
.kpi.c::before{background:radial-gradient(circle,#0891b2,transparent 70%)}
.kpi.p{border-top-color:#9333ea}
.kpi.p .val{color:#7e22ce}
.kpi.p::before{background:radial-gradient(circle,#9333ea,transparent 70%)}
.kpi .lbl{font-size:var(--fs-sm);color:var(--txt2);margin-bottom:8px;display:flex;align-items:center;gap:7px;font-weight:600}
.kpi .val{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-1px;color:var(--txt);font-variant-numeric:tabular-nums;line-height:1.15}
.kpi .sub{font-size:var(--fs-xs);color:var(--txt3);margin-top:6px;font-weight:500}
.kpi.lift:hover{transform:translateY(-3px);box-shadow:var(--sh-md)}
.tbl-wrap{overflow:auto;max-height:70vh;border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--sh-xs);background:var(--surface);-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px;white-space:nowrap}
thead th{background:var(--grad2);color:var(--txt-on);font-weight:700;padding:13px 15px;text-align:right; position:sticky;top:0;z-index:5;font-size:var(--fs-sm);letter-spacing:.2px; box-shadow:0 2px 0 rgba(0,0,0,.06)}
thead th:first-child{border-top-right-radius:var(--r-md)}
thead th:last-child{border-top-left-radius:var(--r-md)}
tbody td{padding:12px 15px;border-bottom:1px solid var(--border);color:var(--txt)}
tbody tr:nth-child(even){background:var(--card2)}
tbody tr:hover{background:var(--primary-soft);transition:background .15s}
tbody tr:last-child td{border-bottom:none}
tbody td:first-child{color:var(--primary-d);font-weight:700;border-right:3px solid transparent}
tbody tr:hover td:first-child{border-right-color:var(--primary)}
.tbl-total td{background:var(--grad);color:var(--txt-on)!important;font-weight:800;border-top:2px solid var(--primary-l)}
.tbl-total td:first-child{color:var(--txt-on)!important}
td.editable{cursor:pointer;border-radius:var(--r-xs);transition:.15s}
td.editable:hover{background:var(--primary-soft);box-shadow:inset 0 0 0 1.5px var(--primary)}
td.num,th.num{text-align:center;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:4px 11px;border-radius:var(--r-pill);font-size:var(--fs-xs);font-weight:700;letter-spacing:.2px}
.b-ok{background:var(--ok-bg);color:var(--green)}
.b-warn{background:var(--warn-bg);color:var(--amber)}
.b-bad{background:var(--bad-bg);color:var(--red)}
.b-info{background:var(--info-bg);color:var(--primary-d)}
.b-mut{background:var(--bg2);color:var(--txt2)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.toolbar input,.toolbar select{padding:9px 12px;font-size:13px}
.field{margin-bottom:14px;min-width:0}
.field label{display:block;font-size:var(--fs-sm);color:var(--txt2);margin-bottom:6px;font-weight:600}
.field input,.field select,.field textarea{width:100%}
.row-fields{display:grid;gap:14px}
.row-fields>*{min-width:0}
.hint{font-size:var(--fs-xs);color:var(--txt3);margin-top:5px;line-height:1.5}
.divider{height:1px;background:var(--border);margin:18px 0}
.pill-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:var(--r-pill);overflow:hidden}
.seg-b{background:var(--surface);color:var(--txt2);padding:6px 14px;font-size:13px;font-weight:700}
.seg-b.on{background:var(--primary);color:#fff}
.empty{text-align:center;padding:52px 20px;color:var(--txt3)}
.empty .ic{font-size:50px;margin-bottom:14px;opacity:.55;display:block}
.access-deny{text-align:center;padding:64px 20px;color:var(--txt2)}
.access-deny .ic{font-size:58px;margin-bottom:16px;display:block}
.modal-bg{position:fixed;inset:0;background:rgba(26,28,46,.42);backdrop-filter:blur(5px); display:none;align-items:center;justify-content:center;z-index:200;padding:18px;animation:fade .2s}
.modal-bg.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg); width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg); animation:popIn .32s var(--ease-out)}
.modal-h{display:flex;align-items:center;padding:18px 22px;border-bottom:1px solid var(--border); position:sticky;top:0;background:var(--surface);z-index:1}
.modal-h h3{font-size:var(--fs-lg);flex:1;font-weight:800;letter-spacing:-.3px}
.modal-h .x{background:var(--card2);border:1px solid var(--border);color:var(--txt2); width:32px;height:32px;border-radius:var(--r-xs);font-size:16px;transition:.15s}
.modal-h .x:hover{background:var(--bad-bg);color:var(--red);border-color:var(--red)}
.modal-b{padding:22px}
.modal-f{padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-start; position:sticky;bottom:0;background:var(--surface)}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(90px); background:var(--grad-green);color:#fff;padding:13px 24px;border-radius:var(--r-pill);font-weight:700; z-index:500;opacity:0;transition:.35s var(--ease-out);box-shadow:var(--sh-lg)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{background:var(--grad-red)}
.shift-tabs{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.shift-tab{flex:1;min-width:120px;background:var(--surface);border:1.5px solid var(--border); border-radius:var(--r-md);padding:13px;text-align:center;cursor:pointer;transition:.18s var(--ease);box-shadow:var(--sh-xs)}
.shift-tab:hover{border-color:var(--primary-l);transform:translateY(-2px);box-shadow:var(--sh-sm)}
.shift-tab .t{font-size:var(--fs-base);font-weight:700;margin-bottom:3px}
.shift-tab .h{font-size:var(--fs-xs);color:var(--txt3)}
.shift-tab.active{border-color:transparent;background:var(--grad);color:var(--txt-on);box-shadow:var(--sh-primary)}
.shift-tab.active .h{color:rgba(255,255,255,.8)}
.shift-tab.done{border-color:var(--green)}
.shift-tab.done .t::after{content:' ✓';color:var(--green)}
.shift-tab.active.done .t::after{color:#fff}
.seg{display:inline-flex;background:var(--card2);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--sh-xs)}
.seg button{background:transparent;color:var(--txt2);padding:8px 15px;font-size:var(--fs-sm);font-weight:700;transition:.15s}
.seg button:hover{background:var(--primary-soft);color:var(--primary-d)}
.seg button.on{background:var(--grad);color:var(--txt-on)}
.house-block{background:var(--card2);border:1px solid var(--border);border-radius:var(--r-md);padding:15px;margin-bottom:13px}
.house-block h4{font-size:13.5px;margin-bottom:11px;color:var(--primary-d)}
.chart-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;box-shadow:var(--sh-xs)}
.chart-wrap canvas{width:100%;height:auto;display:block}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:var(--fs-sm);color:var(--txt2);margin-top:10px}
.legend .it{display:flex;align-items:center;gap:7px;font-weight:600}
.legend .sw{width:16px;height:4px;border-radius:var(--r-pill)}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .nm{width:150px;font-size:var(--fs-sm);color:var(--txt2);flex-shrink:0;font-weight:600}
.bar-track{flex:1;background:var(--bg2);border-radius:var(--r-pill);height:24px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:var(--r-pill);display:flex;align-items:center;justify-content:flex-end; padding:0 10px;font-size:var(--fs-xs);font-weight:800;color:#fff;min-width:30px;box-shadow:var(--sh-xs)}
.bar-row .vl{width:128px;text-align:left;font-size:var(--fs-sm);font-variant-numeric:tabular-nums;font-weight:600}
.statrow{display:flex;align-items:center;justify-content:space-between;border-radius:var(--r-md); padding:12px 16px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border); border-right:4px solid var(--primary);transition:border-color .18s var(--ease),box-shadow .18s;box-shadow:var(--sh-xs)}
.statrow:hover{box-shadow:var(--sh-sm);border-right-color:var(--primary)}
.statrow .lab{font-size:var(--fs-sm);font-weight:600;color:var(--txt2)}
.statrow .num{font-size:var(--fs-lg);font-weight:800;font-variant-numeric:tabular-nums;color:var(--txt)}
.st-blue{border-right-color:#3b82f6}
.st-blue .num{color:#1d4ed8}
.st-green{border-right-color:#16a34a}
.st-green .num{color:#15803d}
.st-amber{border-right-color:#d97706}
.st-amber .num{color:#b45309}
.st-cyan{border-right-color:#0891b2}
.st-cyan .num{color:#0e7490}
.st-purple{border-right-color:#9333ea}
.st-purple .num{color:#7e22ce}
.st-rose{border-right-color:#e11d48}
.st-rose .num{color:#be123c}
.st-teal{border-right-color:#0d9488}
.st-teal .num{color:#0f766e}
.st-slate{border-right-color:#64748b}
.st-slate .num{color:#475569}
.st-indigo{border-right-color:#4f46e5}
.st-indigo .num{color:#3730a3}
.st-orange{border-right-color:#ea580c}
.st-orange .num{color:#c2410c}
.st-trader{border-right-color:#9333ea}
.st-trader .num{color:#7e22ce}
.owner-hero{background:var(--grad);border-radius:var(--r-xl);padding:26px 28px;margin-bottom:20px; box-shadow:var(--sh-lg);position:relative;overflow:hidden;animation:popIn .5s var(--ease-out) both;color:#fff}
.owner-hero::after{content:'';position:absolute;left:-50px;top:-50px;width:220px;height:220px; background:radial-gradient(circle,rgba(255,255,255,.25),transparent 70%);border-radius:50%}
.owner-hero h2{font-size:var(--fs-2xl);color:#fff;margin-bottom:5px;font-weight:800;letter-spacing:-.6px}
.owner-hero .d{color:rgba(255,255,255,.9);font-size:var(--fs-sm)}
.owner-hero .date{position:absolute;left:26px;top:26px;background:rgba(255,255,255,.2); padding:7px 15px;border-radius:var(--r-pill);font-size:var(--fs-sm);color:#fff;font-weight:700;backdrop-filter:blur(4px)}
.ov-val{position:relative;background:var(--warn-bg)!important;border-radius:var(--r-xs);padding:2px 8px; box-shadow:inset 0 0 0 1.5px var(--amber);font-weight:800;color:var(--amber)}
.ov-val::after{content:'✏';font-size:9px;margin-right:4px;opacity:.85}
.ov-edit{cursor:pointer}
.ov-edit:hover{outline:1.5px dashed var(--amber);outline-offset:2px;border-radius:var(--r-xs)}
.ref-good{color:var(--green);font-weight:700}
.ref-bad{color:var(--amber);font-weight:700}
.spacer{flex:1}
@keyframes popIn{from{opacity:0;transform:translateY(16px) scale(.97)}
to{opacity:1;transform:none}
}
@keyframes growBar{from{width:0!important}
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(99,91,255,.45)}
50%{box-shadow:0 0 0 9px rgba(99,91,255,0)}
}
@keyframes spin{to{transform:rotate(360deg)}
}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-left:5px}
#saveInd{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(70px); background:var(--grad2);color:#fff;padding:10px 20px;border-radius:var(--r-pill);font-weight:700;font-size:13px; z-index:600;opacity:0;transition:.3s var(--ease-out);box-shadow:var(--sh-lg);display:flex;align-items:center;gap:4px}
#saveInd.show{transform:translateX(-50%) translateY(0);opacity:1}
#saveInd.done{background:var(--grad-green)}
.anim-kpi{animation:popIn .5s var(--ease-out) both}
.anim-kpi:nth-child(1){animation-delay:.04s}
.anim-kpi:nth-child(2){animation-delay:.1s}
.anim-kpi:nth-child(3){animation-delay:.16s}
.anim-kpi:nth-child(4){animation-delay:.22s}
.grow{animation:growBar 1s var(--ease-out) both}
.pulse{animation:pulse 2s infinite}
@media(max-width:1024px){.g4,.g5{grid-template-columns:repeat(2,1fr)}
.main{padding:20px}
}
@media(max-width:880px){.sidebar{position:fixed;right:0;top:58px;bottom:0;z-index:60;transform:translateX(100%); transition:transform .28s var(--ease-out);box-shadow:var(--sh-lg);width:264px;overflow-y:auto}
.sidebar.open{transform:none}
.menu-btn{display:block}
.g2,.g3,.g4,.g5{grid-template-columns:1fr}
.main{padding:16px}
.uname{display:none}
.page-head h2{font-size:var(--fs-xl)}
.bar-row .nm{width:110px}
.bar-row .vl{width:92px}
.sb-overlay{display:none;position:fixed;inset:58px 0 0 0;background:rgba(0,0,0,.4);z-index:55;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
.sb-overlay.show{display:block}
}
@media(max-width:520px){.topbar{padding:9px 12px;gap:6px}
.brand span:last-child{display:none}
.main{padding:12px 10px}
.card{padding:14px 13px;border-radius:var(--r-md)}
.statrow{padding:11px 13px}
.statrow .num{font-size:var(--fs-md)}
.statrow .lab{font-size:13px}
.kpi{padding:15px 16px}
.kpi .val{font-size:var(--fs-xl)}
.page-head h2{font-size:var(--fs-lg)}
.page-head .sub{font-size:12px}
.btn,.btn-sec,.btn-green,.btn-red,.btn-amber{padding:11px 16px;font-size:14px}
.btn-sm{padding:8px 12px;font-size:13px}
.btn-xs{padding:6px 10px;font-size:12px}
table{font-size:12px}
th,td{padding:8px 7px}
.modal{max-width:100%;margin:0;border-radius:16px 16px 0 0;max-height:94vh;position:fixed;bottom:0;left:0;right:0}
.modal-bg{align-items:flex-end}
.toolbar{gap:6px}
.toolbar select,.toolbar input{font-size:13px;padding:8px 10px}
.field input,.field select,.field textarea{font-size:16px;padding:10px 12px}
.seg button{padding:8px 11px;font-size:12.5px}
.tbl-wrap{max-height:64vh}
.syncBadge,#syncBadge{font-size:10px}
.user-chip .role{font-size:10px}
.nav-item{padding:13px 14px}
}
@media(max-width:400px){.brand .ic{font-size:18px}
.page-head .ic-wrap{width:38px;height:38px;font-size:18px}
.kpi .val{font-size:18px}
}
@media(hover:none) and (pointer:coarse){.nav-item,.btn,.btn-sec,.btn-sm,button{min-height:40px}
input[type=checkbox]{width:20px;height:20px}
}</style>

 if(!fbReady()){console.log('Firebase غير مُهيّأ — يعمل أوف لاين');return false;}
 try{
 if(!FB){FB=firebase.initializeApp(FIREBASE_CONFIG);FB_DB=firebase.database();}
 FB_ON=true;
 FB_DB.ref('erp').on('value',snap=>{
 const data=snap.val();
 if(!data)return;
 if(FB_SYNCING)return;
 const incoming=JSON.stringify(data);
 if(incoming===JSON.stringify(DB)){updateSyncBadge('متزامن ✓');return;}
 FB_REMOTE=true;
 DB=normalizeDB(data);
 invalidateCache();
 localStorage.setItem(DBKEY,incoming);
 FB_REMOTE=false;
 if(ME&&document.getElementById('app').style.display!=='none'){go(CUR);}
 updateSyncBadge('متزامن ✓');
 updateRevIndicator();
 },err=>{console.warn('FB read error',err);updateSyncBadge('خطأ اتصال',true);});
 updateSyncBadge('متصل ☁️');
 startCloudBackupTimer();
 return true;
 }catch(e){console.error('FB init',e);return false;}
}

 FB_DB.ref('erp').set(DB)

 .catch(e=>{console.warn('FB write',e);updateSyncBadge('فشل الحفظ السحابي',true);hideSaving();})
 .finally(()=>{setTimeout(()=>FB_SYNCING=false,400);});
 },700);

function load(){try{const r=localStorage.getItem(DBKEY);const d=r?JSON.parse(r):defaultDB();return normalizeDB(d);}catch(e){return defaultDB();}}
function normalizeDB(d){
 if(!d||typeof d!=='object')return defaultDB();
 const def=defaultDB();
 ['users','farms','cycles','daily','feedMoves','medMoves','birdMoves','sales','yearlyRef','workers','wAbsence','medStock','equipment','faults','cleaning','issues','symptomLogs'].forEach(k=>{
 if(!Array.isArray(d[k]))d[k]=[];
 });
 if(!d.checkState||typeof d.checkState!=='object')d.checkState={};
 if(!d.labels||typeof d.labels!=='object')d.labels=def.labels;
 else{Object.keys(DEFAULT_LABELS).forEach(k=>{if(d.labels[k]===undefined)d.labels[k]=DEFAULT_LABELS[k];});}
 if(!d.settings||typeof d.settings!=='object')d.settings=def.settings;
 if(!Array.isArray(d.settings.medTypes)||!d.settings.medTypes.length)d.settings.medTypes=def.settings.medTypes;
 if(!Array.isArray(d.settings.medUnits)||!d.settings.medUnits.length)d.settings.medUnits=def.settings.medUnits;
 if(!Array.isArray(d.settings.diseases)||!d.settings.diseases.length)d.settings.diseases=def.settings.diseases;
 if(!Array.isArray(d.settings.workerJobs)||!d.settings.workerJobs.length)d.settings.workerJobs=def.settings.workerJobs;
 if(!Array.isArray(d.settings.disinfectUses)||!d.settings.disinfectUses.length)d.settings.disinfectUses=def.settings.disinfectUses;
 if(!Array.isArray(d.settings.equipTypes)||!d.settings.equipTypes.length)d.settings.equipTypes=def.settings.equipTypes;
 if(!Array.isArray(d.settings.faultTypes)||!d.settings.faultTypes.length)d.settings.faultTypes=def.settings.faultTypes;
 if(!Array.isArray(d.settings.manufacturers)||!d.settings.manufacturers.length)d.settings.manufacturers=def.settings.manufacturers;
 if(!Array.isArray(d.settings.cleaningActs)||!d.settings.cleaningActs.length)d.settings.cleaningActs=def.settings.cleaningActs;
 if(d.settings.fanCapacity==null)d.settings.fanCapacity=36000;
 if(d.settings.summerFactor==null)d.settings.summerFactor=4;
 if(d.settings.fcrTarget==null)d.settings.fcrTarget=2.0;
 if(!Array.isArray(d.settings.customRoles))d.settings.customRoles=[];
 if(!d.users.length)d.users=def.users;
 if(!d._meta||typeof d._meta!=='object')d._meta={rev:0,at:0,by:''};
 if(typeof d._meta.rev!=='number')d._meta.rev=0;
 return d;
}

function loadBackups(){try{return JSON.parse(localStorage.getItem(BAKKEY))||{};}catch(e){return {};}}
function autoBackup(){
 const baks=loadBackups();
 const day=todayISO();
 baks[day]={ts:Date.now(),data:DB};
 const days=Object.keys(baks).sort();
 while(days.length>30){const d=days.shift();delete baks[d];}
 try{localStorage.setItem(BAKKEY,JSON.stringify(baks));}
 catch(e){
 const dd=Object.keys(baks).sort();if(dd.length){delete baks[dd[0]];localStorage.setItem(BAKKEY,JSON.stringify(baks));}
 }
}
function restoreBackup(day){
 const baks=loadBackups();if(!baks[day])return;
 if(!confirm('استرجاع نسخة يوم '+day+'؟ سيتم استبدال البيانات الحالية.\n(سيتم حفظ نسخة طوارئ قبل الاسترجاع.)'))return;
 const baks2=loadBackups();baks2['_pre_restore']={ts:Date.now(),data:DB};
 try{localStorage.setItem(BAKKEY,JSON.stringify(baks2));}catch(e){}
 DB=JSON.parse(JSON.stringify(baks[day].data));
 localStorage.setItem(DBKEY,JSON.stringify(DB));
 toast('تم استرجاع نسخة '+day+' ✓');renderApp();
}
function deleteBackup(day){

function cloudBackupKey(){ return todayISO(); }
function maybeCloudBackup(){
 if(!FB_ON||!FB_DB)return;
 const now=new Date();
 if(now.getHours()<3)return;
 const day=cloudBackupKey();
 FB_DB.ref('backups/'+day).once('value').then(snap=>{
 if(snap.exists())return;
 const payload={ts:Date.now(),by:(ME&&ME.name)||'auto',data:DB};
 FB_DB.ref('backups/'+day).set(payload).then(()=>{
 FB_DB.ref('backups').once('value').then(s=>{
 const all=s.val()||{};const days=Object.keys(all).sort();
 while(days.length>30){const d=days.shift();FB_DB.ref('backups/'+d).remove();}
 });
 }).catch(()=>{});
 }).catch(()=>{});
}

function ventRateForWeight(kg){
 if(kg<=VENT_MIN[0][0])return VENT_MIN[0][1];
 for(let i=0;i<VENT_MIN.length-1;i++){
 if(kg>=VENT_MIN[i][0]&&kg<=VENT_MIN[i+1][0]){
 const [w1,r1]=VENT_MIN[i],[w2,r2]=VENT_MIN[i+1];
 return r1+(r2-r1)*(kg-w1)/(w2-w1);
 }
 }
 return VENT_MIN[VENT_MIN.length-1][1];
}
function tempRefForAge(age){
 let best=TEMP_REF[0];
 for(const row of TEMP_REF){ if(age>=row[0])best=row; }
 return {tHigh:best[1],tLow:best[2]};
}

function ageOnDate(cycle,dateISO){
 if(!cycle||!cycle.startDate)return 0;
 const a=new Date(cycle.startDate), b=new Date(dateISO);
 return Math.floor((b-a)/86400000)+1;
}
function dayAggregate(cycleId,houseId,dateISO){
 const recs=DB.daily.filter(d=>d.cycleId===cycleId&&d.houseId===houseId&&d.date===dateISO);
 const sum=(k)=>recs.reduce((s,r)=>s+(Number(r[k])||0),0);
 const closing=recs.find(r=>r.closed)||{};
 return {
 dead:sum('dead'), feed:sum('feed'), water:sum('water'),
 shifts:recs.length, closed:recs.some(r=>r.closed),
 temp:closing.temp||0,tempHi:closing.tempHi||0,tempLo:closing.tempLo||0,
 humidity:closing.humidity||0,culls:closing.culls||0,weight:closing.weight||0,
 notes:closing.notes||'', recs
 };
}
function feedStock(cycleId){
 const cyc=cycleById(cycleId); if(!cyc)return 0;
 let stock=0;
 DB.feedMoves.filter(m=>m.cycleId===cycleId).forEach(m=>{
 if(m.type==='in'||m.type==='transfer_in')stock+=Number(m.qty)||0;
 else if(m.type==='transfer_out'||m.type==='return')stock-=Number(m.qty)||0;
 });
 const used=DB.daily.filter(d=>d.cycleId===cycleId).reduce((s,d)=>s+(Number(d.feed)||0),0);
 return stock-used;
}
function cyclePlaced(cyc){
 if(!cyc)return 0;
 if(cyc.placedByHouse){return Object.values(cyc.placedByHouse).reduce((s,v)=>s+(Number(v)||0),0);}
 return Number(cyc.placed)||0;
}
function birdsRemaining(cycleId){
 const cyc=cycleById(cycleId); if(!cyc)return 0;
 let n=cyclePlaced(cyc);
 n-=DB.daily.filter(d=>d.cycleId===cycleId).reduce((s,d)=>s+(Number(d.dead)||0)+(Number(d.culls)||0),0);
 n-=DB.sales.filter(s=>s.cycleId===cycleId).reduce((s,x)=>s+(Number(x.count)||0),0);
 DB.birdMoves.filter(m=>m.cycleId===cycleId).forEach(m=>{
 if(m.type==='transfer_in')n+=Number(m.qty)||0;
 else if(m.type==='transfer_out')n-=Number(m.qty)||0;
 });
 return n;
}
function birdsRemainingHouse(cycleId,houseId){

 n-=DB.daily.filter(d=>d.cycleId===cycleId&&d.houseId===houseId).reduce((s,d)=>s+(Number(d.dead)||0),0);

}

function lastWeight(cycleId){
 const recs=DB.daily.filter(d=>d.cycleId===cycleId&&Number(d.weight)>0).sort((a,b)=>a.date<b.date?1:-1);
 return recs.length?Number(recs[0].weight):0;

function saleAges(cyc){
 const s=DB.sales.filter(x=>x.cycleId===cyc.id).map(x=>ageOnDate(cyc,x.date)).filter(a=>a>0);
 if(!s.length)return {start:0,end:0,avg:0};
 return {start:Math.min(...s),end:Math.max(...s),avg:Math.round(s.reduce((a,b)=>a+b,0)/s.length)};
}
let _cfCache={}, _cfVer=0;
function invalidateCache(){_cfCache={};_cfVer++;}
function cycleFinal(cyc){
 const ck=cyc.id;
 if(_cfCache[ck])return _cfCache[ck];
 const _r=_cycleFinalCompute(cyc);
 _cfCache[ck]=_r;
 return _r;
}
function _cycleFinalCompute(cyc){
 const placed=cyclePlaced(cyc);
 const dead=deadCumulative(cyc.id);
 const culls=cycleCulls(cyc.id);
 const sales=cycleSales(cyc.id);
 const feedDaily=cycleFeedUsed(cyc.id);
 const feedIn=feedInTotal(cyc.id);
 const inv=cyc.endInventory||{};
 const hasInv=inv.feed!==''&&inv.feed!=null&&!isNaN(Number(inv.feed));
 const feedRemain=hasInv?Number(inv.feed):0;
 const feed=hasInv?Math.max(0,feedIn-feedRemain):feedDaily;
 const feedMethod=hasInv?'inv':'daily';
 const remain=birdsRemaining(cyc.id);
 const lw=lastWeight(cyc.id);
 const deadPct=placed?(dead/placed*100):0;
 const livability=100-deadPct;
 const avgFeedBird=sales.count?(feed/sales.count):0;
 const liveMeat=remain*(lw/1000);
 const totalMeat=sales.weight+liveMeat;
 const avgWeightBird=sales.count?(sales.weight/sales.count):(lw/1000);
 const fcr=totalMeat>0?(feed/totalMeat):0;
 const ages=saleAges(cyc);
 const costs=cyc.costs||{chick:0,feedKg:0,other:0};
 const chickCost=placed*(costs.chick||0);
 const feedCost=feed*(costs.feedKg||0);
 const expenses=cycleExpenses(cyc);
 const totalCost=chickCost+feedCost+expenses.total;
 const revenue=sales.amount;
 const traderDiscount=Number(cyc.traderDiscount)||0;
 const profit=revenue-totalCost-traderDiscount;
 const avgPrice=sales.weight?(sales.amount/sales.weight):0;
 const costPerKg=totalMeat>0?(totalCost/totalMeat):0;
 const profitPerKg=totalMeat>0?(profit/totalMeat):0;
 const rofFeed=feed>0?(profit/feed):0;
 const cfcr=fcr>0?(fcr+((2-avgWeightBird)/4)):0;
 const fcrTargetKg=Number(DB.settings.fcrTarget)||2.0;
 const fcrDiff=fcrTargetKg-avgWeightBird;
 const adjFCR=fcr>0?(fcr+(fcrDiff/4.5)):0;
 const adjFCRValid=Math.abs(fcrDiff)<=0.227;
 const epefAge=ages.avg||ageOnDate(cyc,todayISO());
 const epef=(epefAge>0&&fcr>0)?((livability*avgWeightBird)/(epefAge*fcr)*100):0;
 const R={placed,dead,culls,sales,feed,feedIn,feedRemain,feedMethod,feedDaily,remain,lw,deadPct,livability,avgFeedBird,
 liveMeat,totalMeat,avgWeightBird,fcr,ages,chickCost,feedCost,expenses,totalCost,
 revenue,traderDiscount,profit,avgPrice,costPerKg,profitPerKg,rofFeed,
 cfcr,adjFCR,adjFCRValid,fcrTargetKg,epef,costs};
 const ov=cyc.overrides||{};
 R._ov={};
 Object.keys(ov).forEach(k=>{ if(ov[k]!==''&&ov[k]!=null){ R[k]=Number(ov[k]); R._ov[k]=true; } });
 return R;
}

function overrideModal(cycleId){

 if(!cyc.overrides)cyc.overrides={};
 const F=cycleFinal(cyc);
 const rows=OV_FIELDS.map(([k,lbl])=>{

 ${ov!=null&&ov!==''?'class="ov-val"':''}></div>`;
 }).join('');

 `<button class="btn btn-green" onclick="saveOverrides('${cycleId}')">حفظ</button>

function aggregateCycles(cycList){
 const A={placed:0,dead:0,culls:0,feed:0,salesCount:0,salesWeight:0,salesAmount:0,
 remain:0,totalMeat:0,revenue:0,totalCost:0,profit:0,n:cycList.length};
 cycList.forEach(c=>{
 const f=cycleFinal(c);
 A.placed+=f.placed;A.dead+=f.dead;A.culls+=f.culls;A.feed+=f.feed;
 A.salesCount+=f.sales.count;A.salesWeight+=f.sales.weight;A.salesAmount+=f.sales.amount;
 A.remain+=f.remain;A.totalMeat+=f.totalMeat;A.revenue+=f.revenue;A.totalCost+=f.totalCost;A.profit+=f.profit;
 });
 A.deadPct=A.placed?(A.dead/A.placed*100):0;
 A.livability=100-A.deadPct;
 A.fcr=A.totalMeat>0?(A.feed/A.totalMeat):0;
 A.avgWeight=A.salesCount?(A.salesWeight/A.salesCount):0;
 A.avgPrice=A.salesWeight?(A.salesAmount/A.salesWeight):0;
 A.costPerKg=A.totalMeat>0?(A.totalCost/A.totalMeat):0;
 A.profitPerKg=A.totalMeat>0?(A.profit/A.totalMeat):0;
 A.rofFeed=A.feed>0?(A.profit/A.feed):0;
 A.cfcr=A.fcr>0?(A.fcr+((2-A.avgWeight)/4)):0;
 const _fcrT=Number(DB.settings.fcrTarget)||2.0;
 const _fcrD=_fcrT-A.avgWeight;
 A.adjFCR=A.fcr>0?(A.fcr+(_fcrD/4.5)):0;
 A.adjFCRValid=Math.abs(_fcrD)<=0.227;
 A.fcrTargetKg=_fcrT;
 return A;
}

function rowColor(el,def){
 for(const c of (el.className||'').split(/\s+/)){ if(PRINT_COLORS[c])return PRINT_COLORS[c]; }
 return def||'#635bff';
}
function walkPrint(node,parts){
 if(!node||!node.children)return;
 let pendingCards=[];
 const flushCards=()=>{
 if(!pendingCards.length)return;
 parts.push('<div class="pcards">'+pendingCards.map(([l,v,sub,col])=>
 `<div class="pcard" style="border-right-color:${col}"><div class="pc-l">${l}</div><div class="pc-v" style="color:${col}">${v}${sub?`<span class="pc-s">${sub}</span>`:''}</div></div>`).join('')+'</div>');
 pendingCards=[];
 };
 [...node.children].forEach(ch=>{
 if(!ch.classList)return;
 if(ch.classList.contains('toolbar')||ch.classList.contains('no-print'))return;
 if(ch.classList.contains('card-title')){
 flushCards();
 const txt=ch.textContent.replace(/🖨️.*$/,'').replace(/\s+/g,' ').trim();
 if(txt)parts.push('<h3>'+esc(txt)+'</h3>');
 return;
 }
 if(ch.classList.contains('statrow')){
 const lbl=(ch.querySelector('.lab')||{}).textContent||'';
 const numEl=ch.querySelector('.num');
 let val=(numEl||{}).textContent||'';
 let sub='';const hintEl=numEl&&numEl.querySelector('.hint');
 if(hintEl){sub=hintEl.textContent.trim();val=val.replace(sub,'').trim();}
 pendingCards.push([esc(lbl.trim()),esc(val.trim()),esc(sub),rowColor(ch)]);
 return;
 }
 if(ch.classList.contains('kpi')){
 const lbl=(ch.querySelector('.lbl')||{}).textContent||'';
 const val=(ch.querySelector('.val')||{}).textContent||'';
 const subEl=ch.querySelector('.sub');const sub=subEl?subEl.textContent.trim():'';
 pendingCards.push([esc(lbl.trim()),esc(val.trim()),esc(sub),rowColor(ch)]);
 return;
 }
 if(ch.classList.contains('tbl-wrap')){
 flushCards();
 const t=ch.querySelector('table');
 if(t)parts.push(t.outerHTML);
 return;
 }
 if(ch.tagName==='TABLE'){ flushCards(); parts.push(ch.outerHTML); return; }
 if(ch.classList.contains('hint')){
 flushCards();
 const txt=ch.textContent.trim();
 if(txt)parts.push('<div style="font-size:11px;color:#888;margin:4px 0">'+esc(txt)+'</div>');
 return;
 }
 if(ch.classList.contains('card')){
 flushCards();
 const sub=[]; walkPrint(ch,sub);
 if(sub.length)parts.push('<div class="pcard-group">'+sub.join('')+'</div>');
 return;
 }
 if(ch.classList.contains('grid')){
 flushCards();
 walkPrint(ch,parts);
 return;
 }
 if(ch.querySelector&&(ch.querySelector('table')||ch.querySelector('.statrow')||ch.querySelector('.kpi')||ch.querySelector('.card-title'))){
 flushCards();
 walkPrint(ch,parts);
 }
 });
 flushCards();
}

 });

let dashState={cycleId:null,metric:'weight'};
function drawDashChart(){
 const cv=$('#dashChart');if(!cv)return;
 const cyc=cycleById(dashState.cycleId);if(!cyc)return;
 const ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
 ctx.clearRect(0,0,W,H);
 const pad={l:55,r:18,t:18,b:34};
 const metric=dashState.metric;
 const dates=[...new Set(DB.daily.filter(d=>d.cycleId===cyc.id).map(d=>d.date))].sort();
 let actual=[],cumDead=0;
 dates.forEach(dt=>{const d=cycleDayData(cyc,dt);cumDead+=d.dead;
 let v=metric==='weight'?d.weight:metric==='feed'?d.feed:cumDead;
 actual.push({age:d.age,v});});
 actual=actual.filter(p=>p.age>0);
 const maxAge=Math.max(actual.length?Math.max(...actual.map(p=>p.age)):1, 1);
 let ref=[];
 if(metric!=='dead'){ROSS308.filter(r=>r.d<=maxAge+1).forEach(r=>{ref.push({age:r.d,v:metric==='weight'?r.w:r.fd});});}
 const allV=[...actual.map(p=>p.v),...ref.map(p=>p.v)].filter(v=>v>0);
 const maxV=allV.length?Math.max(...allV)*1.1:1;const maxX=maxAge;
 const X=a=>pad.l+(a-1)/(Math.max(maxX-1,1))*(W-pad.l-pad.r);
 const Y=v=>H-pad.b-(v/maxV)*(H-pad.t-pad.b);
 ctx.strokeStyle='#e7e9f2';ctx.fillStyle='#9095af';ctx.font='11px Tahoma';ctx.lineWidth=1;
 for(let i=0;i<=4;i++){const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
 ctx.textAlign='right';ctx.fillText(fmt(maxV*(1-i/4),0),pad.l-6,y+4);}
 ctx.textAlign='center';
 for(let a=1;a<=maxX;a+=Math.ceil(maxX/10)){ctx.fillText(a,X(a),H-pad.b+16);}
 function line(pts,color,dash){if(pts.length<1)return;ctx.strokeStyle=color;ctx.lineWidth=2.4;ctx.setLineDash(dash||[]);
 ctx.beginPath();pts.forEach((p,i)=>{const x=X(p.age),y=Y(p.v);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();ctx.setLineDash([]);}
 if(ref.length)line(ref,'#f5a623',[6,4]);
 if(actual.length)line(actual,'#635bff');
 ctx.fillStyle='#635bff';actual.forEach(p=>{ctx.beginPath();ctx.arc(X(p.age),Y(p.v),2.6,0,7);ctx.fill();});
 const ml={weight:'الوزن (جم)',feed:'العلف اليومي (جم)',dead:'النافق التراكمي'}[metric];
 $('#dashLegend').innerHTML=`<div class="it"><span class="sw" style="background:#635bff"></span>الفعلي — ${ml}</div>`+
 (ref.length?`<div class="it"><span class="sw" style="background:#f5a623"></span>مرجع Ross 308</div>`:'');
}

function delFeedMove(id){const m=DB.feedMoves.find(x=>x.id===id);if(isManager()&&!within24h(m)){toast('انتهت مهلة الحذف (24 ساعة)',1);return;}if(!confirm('حذف الحركة؟'))return;DB.feedMoves=DB.feedMoves.filter(m=>m.id!==id);save();renderFeed();}
let medFilter={type:'',item:'',disease:''};
function medKind(m){return m.kind||'vaccine';}
const STOCK_MOVES={open:'موجود أول الدورة',carry:'مرحّل من السابقة',transfer:'محوّل (صادر)',return:'مرتجع للمخزن',closeAdj:'تعديل جرد'};
function medConsumed(cycleId,kind,item){
 return DB.medMoves.filter(m=>m.cycleId===cycleId&&medKind(m)===kind&&m.item===item)
 .reduce((s,m)=>s+(Number(m.qty)||0),0);
}
function medBalance(cycleId,kind,item){
 const st=DB.medStock.filter(s=>s.cycleId===cycleId&&s.kind===kind&&s.item===item);
 let bal=0;
 st.forEach(s=>{const q=Number(s.qty)||0;
 if(s.move==='open'||s.move==='carry'||s.move==='return')bal+=q;
 else if(s.move==='transfer')bal-=q;
 else if(s.move==='closeAdj')bal+=q;
 });
 bal-=medConsumed(cycleId,kind,item);
 return bal;
}
function medItemsOfCycle(cycleId,kind){
 const a=DB.medStock.filter(s=>s.cycleId===cycleId&&s.kind===kind).map(s=>s.item);
 const b=DB.medMoves.filter(m=>m.cycleId===cycleId&&medKind(m)===kind).map(m=>m.item);
 return [...new Set([...a,...b])].filter(Boolean);
}
function medUnitOf(cycleId,kind,item){
 const s=DB.medStock.find(x=>x.cycleId===cycleId&&x.kind===kind&&x.item===item&&x.unit);
 if(s)return s.unit;
 const m=DB.medMoves.find(x=>x.cycleId===cycleId&&medKind(x)===kind&&x.item===item&&x.unit);
 return m?m.unit:'';
}

 h+=`<div class="toolbar">

 </div>`;
 const KIND_TITLE={drug:'💊 أرصدة الأدوية',vaccine:'💉 أرصدة التحصينات',disinfectant:'🧴 أرصدة المطهرات'};
 ['drug','vaccine','disinfectant'].forEach(kind=>{
 const items=medItemsOfCycle(medStockCycle,kind);
 if(!items.length)return;
 h+=`<div class="card-title" style="font-size:14px;margin-top:10px">${KIND_TITLE[kind]}</div>
 <div class="tbl-wrap"><table><thead><tr><th>الصنف</th><th class="num">موجود أول الدورة</th>
 <th class="num">مرحّل</th><th class="num">مرتجع</th><th class="num">محوّل</th>

 items.forEach(it=>{
 const g=t=>DB.medStock.filter(s=>s.cycleId===medStockCycle&&s.kind===kind&&s.item===it&&s.move===t).reduce((a,s)=>a+(Number(s.qty)||0),0);
 const open=g('open'),carry=g('carry'),ret=g('return'),tr=g('transfer'),adj=g('closeAdj');

 });

}

function daysBetween(from,to){
 if(!from)return 0;
 const a=new Date(from), b=new Date(to||todayISO());
 return Math.max(0,Math.round((b-a)/86400000)+1);
}
function absenceDaysInRange(workerId,from,to){
 const recs=DB.wAbsence.filter(a=>a.workerId===workerId);
 let absence=0,leave=0,mission=0;
 const rangeFrom=new Date(from), rangeTo=new Date(to||todayISO());
 recs.forEach(a=>{
  const af=new Date(a.from), at=new Date(a.to||a.from);
  const s=af>rangeFrom?af:rangeFrom, e=at<rangeTo?at:rangeTo;
  if(s<=e){const d=Math.round((e-s)/86400000)+1;
   if(a.type==='leave')leave+=d;else if(a.type==='mission')mission+=d;else absence+=d;}
 });
 return {absence,leave,mission,total:absence+leave+mission};
}

const ISSUE_TYPES=['تغذية','تهوية','مياه','صحة','إدارة','معدات','أمان حيوي','أخرى'];
function groupedIssues(farmId){
 const src=farmId?DB.issues.filter(i=>i.farmId===farmId):DB.issues;
 const map={};
 src.forEach(i=>{
 const key=i.farmId+'||'+i.title.trim().toLowerCase();
 if(!map[key])map[key]={farmId:i.farmId,title:i.title,type:i.type,count:0,lastDate:'',solution:'',status:'resolved',ids:[]};
 const g=map[key]; g.count++; g.ids.push(i.id);
 if(!g.lastDate||i.date>g.lastDate){g.lastDate=i.date; g.type=i.type;}
 if(i.solution)g.solution=i.solution;
 if(i.status==='open')g.status='open';
 });
 return Object.values(map).sort((a,b)=>b.count-a.count);
}

function symptomSummary(l){
 if(!l.symptoms.length)return `<div class="statrow st-green"><span class="lab">✅ القطيع سليم</span><span class="num">لا أعراض</span></div>`;
 const byCat={};
 l.symptoms.forEach(k=>{for(const g of SYMPTOMS)if(g.items.find(it=>it.k===k)){(byCat[g.cat]=byCat[g.cat]||[]).push(symptomByKey(k));}});
 let s='';
 for(const cat in byCat){
  s+=`<div style="margin-bottom:8px"><b style="font-size:13px">${esc(cat)}</b><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">`;
  s+=byCat[cat].map(it=>`<span class="badge ${it.sev==='high'?'b-bad':it.sev==='med'?'b-warn':'b-info'}">${esc(it.t)}</span>`).join('');
  s+=`</div></div>`;
 }
 if(l.affected)s+=`<div class="hint" style="margin-top:6px">عدد الطيور المصابة تقديرياً: <b>${esc(String(l.affected))}</b></div>`;
 if(l.note)s+=`<div class="hint">📝 ${esc(l.note)}</div>`;
 return s;
}

<script>
/* تسجيل Service Worker + تحديث تلقائي بدون أي تدخّل من المستخدم */
if('serviceWorker' in navigator && location.protocol==='https:'){
  const swCode = `
    const C='brmas-v${APP_VERSION}';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{e.waitUntil((async()=>{
      const keys=await caches.keys();
      await Promise.all(keys.filter(k=>k!==C).map(k=>caches.delete(k)));
      await self.clients.claim();
    })());});
    self.addEventListener('fetch',e=>{
      const r=e.request;
      if(r.url.includes('firebaseio')||r.url.includes('firebasedatabase')||r.url.includes('googleapis')||r.url.includes('gstatic')||r.method!=='GET'){return;}
      const isDoc = r.mode==='navigate' || (r.headers.get('accept')||'').includes('text/html');
      if(isDoc){
        // الصفحة: الشبكة أولاً دائماً (أحدث نسخة)
        e.respondWith(
          fetch(r,{cache:'no-store'}).then(resp=>{const c=resp.clone();caches.open(C).then(ch=>ch.put(r,c));return resp;})
            .catch(()=>caches.match(r).then(h=>h||caches.match('./')))
        );
        return;
      }
      e.respondWith(
        caches.open(C).then(cache=>cache.match(r).then(hit=>{
          const net=fetch(r).then(resp=>{try{cache.put(r,resp.clone());}catch(_){}return resp;}).catch(()=>hit);
          return hit||net;
        }))
      );
    });
  `;
  const blob=new Blob([swCode],{type:'text/javascript'});
  const swURL=URL.createObjectURL(blob);
  navigator.serviceWorker.register(swURL).then(reg=>{
    // افحص وجود تحديث فوراً وبشكل دوري
    reg.update();
    setInterval(()=>reg.update(), 60*1000);
    reg.addEventListener('updatefound',()=>{
      const nw=reg.installing;
      if(!nw)return;
      nw.addEventListener('statechange',()=>{
        // نسخة جديدة جاهزة وفيه SW قديم يتحكم → فعّلها واعمل reload تلقائي مرة واحدة
        if(nw.state==='activated' && navigator.serviceWorker.controller){
          if(!sessionStorage.getItem('sw_reloaded')){
            sessionStorage.setItem('sw_reloaded','1');
            location.reload();
          }
        }
      });
    });
  }).catch(()=>{});
  // لو تغيّر الـ controller (نسخة جديدة سيطرت) اعمل reload مرة واحدة
  let _refreshed=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    if(_refreshed)return;_refreshed=true;
    if(!sessionStorage.getItem('sw_reloaded')){sessionStorage.setItem('sw_reloaded','1');location.reload();}
  });
}
// صفّر علامة الـ reload عند كل جلسة جديدة فعلية

    // اطلب الصفحة نفسها مع كسر الكاش (طابع زمني) — يتجاوز كاش المتصفح و الـ CDN
    const url=location.pathname.split('?')[0]+'?_v='+Date.now();
    const res=await fetch(url,{cache:'no-store'});
    if(!res.ok)return;
    const txt=await res.text();
    const m=txt.match(/const APP_VERSION='(\d+)'/);
    if(m&&m[1]&&m[1]!==APP_VERSION){
      // نسخة أحدث متاحة على الخادم → نظّف الكاش وأعد التحميل مرة واحدة
      if(!sessionStorage.getItem('ver_reloaded')){
        sessionStorage.setItem('ver_reloaded','1');
        try{const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}catch(_){}
        try{const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.update()));}catch(_){}
        location.reload(true);
      }
    } else {
      // نفس النسخة → اسمح بفحص لاحق
      sessionStorage.removeItem('ver_reloaded');
    }
  }catch(_){}
}
window.addEventListener('load',()=>{
  setTimeout(checkNewerVersion, 3000);          // فحص بعد التحميل بثوانٍ
  setInterval(checkNewerVersion, 2*60*1000);    // وكل دقيقتين
});
// افحص أيضاً عند العودة للتطبيق (فتح التبويب بعد ما كان في الخلفية)
document.addEventListener('visibilitychange',()=>{ if(!document.hidden)checkNewerVersion(); });
</script>
